name: Cosmic Mood Engine
on:
  schedule:
    - cron: '0 0 * * *' # Automatically runs every night at midnight UTC
  workflow_dispatch: # Gives you a manual button to click whenever you want

permissions:
  contents: write

jobs:
  run-generator:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set Up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Generate Daily Content
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: python generate.py

    - name: Save Content Changes
      run: |
        git config --global user.name 'Cosmic Mood Bot'
        git config --global user.email 'bot@cosmicmood.com'
        git add horoscopes.json
        git commit -m "Automated update: New horoscopes database created" || echo "No changes to commit"
        git push
